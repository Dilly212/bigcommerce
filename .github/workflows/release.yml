name: Release

on:
  push:
    branches: [master]
    paths:
      - package.json

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get current version
        id: current
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get previous version
        id: previous
        run: |
          git show HEAD~1:package.json > /tmp/prev-package.json 2>/dev/null \
            || echo '{"version":"0.0.0"}' > /tmp/prev-package.json
          echo "version=$(node -p "require('/tmp/prev-package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.current.outputs.version != steps.previous.outputs.version
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.current.outputs.version }}';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              generate_release_notes: true,
            });
